<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dashboard - Librería Gestión</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">📚</div>
                <h2>Librería Gestión</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="#" data-page="dashboard" class="nav-item active">
                    <span class="nav-icon">📊</span>
                    <span>Dashboard</span>
                </a>
                <a href="#" data-page="productos" class="nav-item">
                    <span class="nav-icon">📦</span>
                    <span>Productos</span>
                </a>
                <a href="#" data-page="ventas" class="nav-item">
                    <span class="nav-icon">💰</span>
                    <span>Ventas</span>
                </a>
                <a href="#" data-page="finanzas" class="nav-item">
                    <span class="nav-icon">💵</span>
                    <span>Finanzas</span>
                </a>
                <a href="#" data-page="estadisticas" class="nav-item">
                    <span class="nav-icon">📈</span>
                    <span>Estadísticas</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info" id="userInfo">
                    <span class="user-email" id="userEmail"></span>
                </div>
                <button class="btn-logout" id="btnLogout">🚪 Cerrar Sesión</button>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <button class="menu-toggle" id="menuToggle">☰</button>
                <h1 id="pageTitle">Dashboard</h1>
                <div class="top-bar-actions">
                    <span class="date-time" id="dateTime"></span>
                </div>
            </div>
            
            <div class="content-area" id="contentArea">
                <!-- El contenido se carga dinámicamente -->
            </div>
        </main>
    </div>
    
    <!-- Modal para editar/crear -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Título</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Contenido dinámico -->
            </div>
        </div>
    </div>
    
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
