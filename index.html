<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Librería Gestión - Iniciar Sesión</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-icon">📚</div>
            <h1>Librería Gestión</h1>
            
            <div class="login-divider"></div>
            
            <div id="login-status" class="login-status"></div>
            
            <div class="google-signin-container">
                <div id="g_id_onload"
                     data-client_id="193099771151-s4f2eknomeire8tmbirv7vnfqtnimujo.apps.googleusercontent.com"
                     data-callback="handleGoogleLogin"
                     data-auto_prompt="false">
                </div>
                <div class="g_id_signin"
                     data-type="standard"
                     data-size="large"
                     data-theme="outline"
                     data-text="sign_in_with"
                     data-shape="rectangular"
                     data-logo_alignment="left">
                </div>
            </div>
            
            <p class="login-note">Solo usuarios autorizados pueden acceder</p>
        </div>
    </div>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
