<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librería Gestión - Iniciar Sesión</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-icon">📚</div>
            <h1>Librería Gestión</h1>
            
            <div class="login-divider"></div>
            
            <div id="login-status" class="login-status"></div>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label>✉️ Tu correo electrónico</label>
                    <input type="email" id="loginEmail" placeholder="tucorreo@gmail.com" required autofocus>
                </div>
                <button type="submit" class="btn-primary btn-large" style="width: 100%;">Ingresar</button>
            </form>
            
            <p class="login-note">Solo usuarios autorizados pueden acceder. Contactá al administrador si no tenés acceso.</p>
        </div>
    </div>
    
    <script src="config.js"></script>
    <script>
        const form = document.getElementById('loginForm');
        const statusDiv = document.getElementById('login-status');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('loginEmail').value.trim();

            if (!email) {
                statusDiv.innerHTML = '<div class="error">❌ Ingresá un email válido</div>';
                return;
            }

            statusDiv.innerHTML = '<div>⏳ Verificando acceso...</div>';

            try {
                // Usar fetch normal con modo cors
                const params = new URLSearchParams();
                params.append('accion', 'login');
                params.append('datos', JSON.stringify({ email: email }));
                
                const url = `${CONFIG.GAS_URL}?${params.toString()}`;
                
                const response = await fetch(url, {
                    method: 'GET',
                    mode: 'cors',
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                
                const resultado = await response.json();
                
                if (resultado.success) {
                    localStorage.setItem('libToken', resultado.data.token);
                    localStorage.setItem('libUser', email);
                    window.location.href = 'dashboard.html';
                } else {
                    statusDiv.innerHTML = `<div class="error">❌ Acceso denegado. ${resultado.error || 'Email no autorizado'}</div>`;
                }
                
            } catch (error) {
                console.error('Error detallado:', error);
                statusDiv.innerHTML = `<div class="error">❌ Error de conexión: ${error.message}</div>`;
            }
        });
    </script>
    <style>
        .login-form {
            margin: 1rem 0;
        }
        .login-form .form-group {
            margin-bottom: 1rem;
            text-align: left;
        }
        .login-form input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }
        .error {
            color: #ef4444;
            background: #fee2e2;
            padding: 0.75rem;
            border-radius: 8px;
        }
    </style>
</body>
</html>
