<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librería Gestión - Iniciar Sesión</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-icon">📚</div>
            <h1>Librería Gestión</h1>
            
            <div class="login-divider"></div>
            
            <div id="login-status" class="login-status"></div>
            <div id="login-debug" class="login-debug"></div>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label>✉️ Tu correo electrónico</label>
                    <input type="email" id="loginEmail" placeholder="tucorreo@gmail.com" required autofocus>
                </div>
                <button type="submit" class="btn-primary btn-large" style="width: 100%;">Ingresar</button>
            </form>
            
            <p class="login-note">Solo usuarios autorizados pueden acceder. Contactá al administrador si no tenés acceso.</p>
        </div>
    </div>
    
    <script src="config.js"></script>
    <script>
        const form = document.getElementById('loginForm');
        const statusDiv = document.getElementById('login-status');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('loginEmail').value.trim();

            if (!email) {
                statusDiv.innerHTML = '<div class="error">❌ Ingresá un email válido</div>';
                return;
            }

            if (window.location.protocol === 'file:') {
                statusDiv.innerHTML = '<div class="error">❌ Estás abriendo la app desde file://. Iniciá la app con un servidor local (por ejemplo: http://localhost:5500) o súbela a GitHub Pages.</div>';
                return;
            }

            statusDiv.innerHTML = '<div>⏳ Verificando acceso...</div>';

            try {
                const callbackName = 'jsonp_' + Date.now();

                const origin = window.location.origin === 'null' ? '' : window.location.origin;
                const referer = window.location.href;
                const url = `${CONFIG.GAS_URL}?accion=login&datos=${encodeURIComponent(JSON.stringify({ email: email }))}&callback=${callbackName}` +
                            `&origin=${encodeURIComponent(origin)}` +
                            `&referer=${encodeURIComponent(referer)}`;

                const script = document.createElement('script');
                script.src = url;

                console.log('Login JSONP URL:', url);
                document.getElementById('login-debug').innerText = `Backend request: ${url}`;

                window[callbackName] = function(resultado) {
                    delete window[callbackName];
                    document.body.removeChild(script);

                    if (resultado.success) {
                        localStorage.setItem('libToken', resultado.data.token);
                        localStorage.setItem('libUser', email);
                        window.location.href = 'dashboard.html';
                    } else {
                        statusDiv.innerHTML = `<div class="error">❌ Acceso denegado. ${resultado.error || 'Email no autorizado'}</div>`;
                    }
                };

                script.onerror = function() {
                    delete window[callbackName];
                    document.body.removeChild(script);
                    const debug = document.getElementById('login-debug');
                    if (debug) {
                        debug.innerText += '\nERROR: No se pudo cargar el script del backend. Comprueba que el deploy de GAS esté disponible y que la URL sea correcta.';
                    }
                    statusDiv.innerHTML = `<div class="error">❌ Error de conexión. Verificá la URL del backend: ${CONFIG.GAS_URL}</div>`;
                };

                document.body.appendChild(script);

            } catch (error) {
                console.error('Error detallado:', error);
                statusDiv.innerHTML = `<div class="error">❌ Error inesperado: ${error.message}</div>`;
            }
        });
    </script>
    <style>
        .login-form {
            margin: 1rem 0;
        }
        .login-form .form-group {
            margin-bottom: 1rem;
            text-align: left;
        }
        .login-form input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }
        .error {
            color: #ef4444;
            background: #fee2e2;
            padding: 0.75rem;
            border-radius: 8px;
        }
        .login-debug {
            margin-bottom: 1rem;
            padding: 0.75rem;
            border-radius: 8px;
            background: #f3f4f6;
            color: #1f2937;
            font-size: 0.8rem;
            white-space: pre-wrap;
            word-break: break-word;
        }
    </style>
</body>
</html>
